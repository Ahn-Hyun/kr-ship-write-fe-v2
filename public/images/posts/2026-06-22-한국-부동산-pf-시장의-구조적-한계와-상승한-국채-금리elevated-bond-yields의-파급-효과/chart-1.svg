<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-label="Bar chart comparing South Korea's April 2024 inflation rate (2.6%), the Bank of Korea's benchmark rate (3.5%), and the 10-year government bond yield (4.21%).">
