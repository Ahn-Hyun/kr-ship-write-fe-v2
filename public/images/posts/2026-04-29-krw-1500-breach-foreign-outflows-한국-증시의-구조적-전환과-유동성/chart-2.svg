<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="580" viewBox="0 0 1000 580" role="img" aria-label="Bar chart illustrating the Bank of Korea's upward revisions for 2024, with GDP growth raised from 1.8% to 2.0% and CPI inflation from 2.1% to 2.2%.">
